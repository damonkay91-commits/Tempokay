<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BPM / KEY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --lcd: #ff1a1a;
    --lcd-dim: #3a0000;
    --lcd-glow: rgba(255, 26, 26, 0.4);
    --bg: #000000;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--lcd);
    font-family: 'Share Tech Mono', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Subtle vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 99;
  }

  .screen {
    width: 100%;
    max-width: 480px;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    z-index: 1;
  }

  /* ── LABEL ── */
  .label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--lcd-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
    text-shadow: none;
    transition: color 0.3s;
  }

  /* ── LCD DIGIT BLOCK ── */
  .lcd-block {
    position: relative;
    margin-bottom: 28px;
  }

  .lcd-value {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    color: var(--lcd);
    text-shadow:
      0 0 6px var(--lcd),
      0 0 20px var(--lcd-glow),
      0 0 40px var(--lcd-glow);
    letter-spacing: -0.02em;
    line-height: 1;
    transition: text-shadow 0.1s, color 0.3s;
  }

  .lcd-value.dim {
    color: var(--lcd-dim);
    text-shadow: none;
  }

  .bpm-value {
    font-size: clamp(80px, 22vw, 130px);
  }

  .bpm-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(14px, 4vw, 20px);
    letter-spacing: 0.2em;
    color: var(--lcd-dim);
    margin-top: -4px;
    margin-bottom: 32px;
    transition: color 0.3s;
  }

  .bpm-unit.active {
    color: var(--lcd);
    opacity: 0.5;
  }

  .key-value {
    font-size: clamp(60px, 18vw, 100px);
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: var(--lcd-dim);
    margin: 4px 0 32px;
    opacity: 0.4;
  }

  /* ── SIGNAL BAR ── */
  .signal-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }

  .signal-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--lcd-dim);
  }

  .signal-bars {
    display: flex;
    gap: 4px;
    align-items: flex-end;
  }

  .bar {
    width: 6px;
    background: var(--lcd-dim);
    border-radius: 1px;
    transition: background 0.1s, box-shadow 0.1s;
  }

  .bar.on {
    background: var(--lcd);
    box-shadow: 0 0 6px var(--lcd-glow);
  }

  .bar:nth-child(1) { height: 6px; }
  .bar:nth-child(2) { height: 10px; }
  .bar:nth-child(3) { height: 14px; }
  .bar:nth-child(4) { height: 18px; }
  .bar:nth-child(5) { height: 22px; }
  .bar:nth-child(6) { height: 26px; }
  .bar:nth-child(7) { height: 30px; }
  .bar:nth-child(8) { height: 34px; }

  /* ── TAP BUTTON ── */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--lcd-dim);
    color: var(--lcd-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    padding: 10px 20px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn.primary {
    border-color: var(--lcd);
    color: var(--lcd);
    box-shadow: 0 0 10px var(--lcd-glow), inset 0 0 10px rgba(255,26,26,0.05);
  }

  .btn.primary:active {
    background: rgba(255,26,26,0.15);
    box-shadow: 0 0 20px var(--lcd-glow), inset 0 0 20px rgba(255,26,26,0.1);
  }

  .btn:active { opacity: 0.7; }

  /* ── COLOUR PICKER ── */
  .color-picker-wrap {
    position: relative;
    display: inline-block;
  }

  #colorPicker {
    opacity: 0;
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    border: none;
    padding: 0;
  }

  /* ── STATUS DOT ── */
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--lcd-dim);
    display: inline-block;
    margin-left: 6px;
    vertical-align: middle;
    transition: background 0.2s, box-shadow 0.2s;
  }

  .status-dot.live {
    background: var(--lcd);
    box-shadow: 0 0 8px var(--lcd);
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Beat flash */
  .beat-flash {
    position: fixed;
    inset: 0;
    background: var(--lcd);
    opacity: 0;
    pointer-events: none;
    z-index: 98;
    transition: opacity 0.03s;
  }

  .beat-flash.flash {
    opacity: 0.04;
  }
</style>
</head>
<body>

<div class="beat-flash" id="beatFlash"></div>

<div class="screen">
  <div class="lcd-block">
    <div class="label">BPM <span class="status-dot" id="statusDot"></span></div>
    <div class="lcd-value bpm-value dim" id="bpmDisplay">---</div>
    <div class="bpm-unit" id="bpmUnit">BEATS PER MIN</div>
  </div>

  <div class="divider"></div>

  <div class="lcd-block">
    <div class="label">CAMELOT KEY</div>
    <div class="lcd-value key-value dim" id="keyDisplay">--</div>
  </div>

  <div class="signal-row">
    <span class="signal-label">SIG</span>
    <div class="signal-bars" id="signalBars">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn primary" id="startBtn">▶ LISTEN</button>
    <button class="btn" id="tapBtn">TAP BPM</button>
    <div class="color-picker-wrap">
      <button class="btn">COLOUR</button>
      <input type="color" id="colorPicker" value="#ff1a1a" title="Display colour">
    </div>
  </div>
</div>

<script>
// ── COLOUR PICKER ──
const colorPicker = document.getElementById('colorPicker');
colorPicker.addEventListener('input', e => {
  const hex = e.target.value;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  document.documentElement.style.setProperty('--lcd', hex);
  document.documentElement.style.setProperty('--lcd-dim', `rgb(${Math.round(r*0.22)},${Math.round(g*0.22)},${Math.round(b*0.22)})`);
  document.documentElement.style.setProperty('--lcd-glow', `rgba(${r},${g},${b},0.4)`);
});

// ── CAMELOT MAP ──
const CAMELOT = {
  'C major':'8B','G major':'9B','D major':'10B','A major':'11B',
  'E major':'12B','B major':'1B','F# major':'2B','Db major':'3B',
  'Ab major':'4B','Eb major':'5B','Bb major':'6B','F major':'7B',
  'A minor':'8A','E minor':'9A','B minor':'10A','F# minor':'11A',
  'C# minor':'12A','G# minor':'1A','D# minor':'2A','Bb minor':'3A',
  'F minor':'4A','C minor':'5A','G minor':'6A','D minor':'7A'
};

// Chromagram note names
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const MAJOR_PROFILE = [6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
const MINOR_PROFILE = [6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];

function correlate(a, b) {
  let ma=0,mb=0;
  for(let i=0;i<12;i++){ma+=a[i];mb+=b[i];}
  ma/=12;mb/=12;
  let num=0,da=0,db=0;
  for(let i=0;i<12;i++){
    const ra=a[i]-ma,rb=b[i]-mb;
    num+=ra*rb; da+=ra*ra; db+=rb*rb;
  }
  return (da*db)===0?0:num/Math.sqrt(da*db);
}

function detectKey(chroma) {
  let best=-2,bestKey='';
  for(let r=0;r<12;r++){
    const rot=chroma.slice(r).concat(chroma.slice(0,r));
    const majScore=correlate(rot,MAJOR_PROFILE);
    const minScore=correlate(rot,MINOR_PROFILE);
    if(majScore>best){best=majScore;bestKey=NOTE_NAMES[r]+' major';}
    if(minScore>best){best=minScore;bestKey=NOTE_NAMES[r]+' minor';}
  }
  return CAMELOT[bestKey]||'--';
}

// ── AUDIO ENGINE ──
let audioCtx, analyser, source, stream;
let running = false;

const bpmDisplay  = document.getElementById('bpmDisplay');
const keyDisplay  = document.getElementById('keyDisplay');
const statusDot   = document.getElementById('statusDot');
const bpmUnit     = document.getElementById('bpmUnit');
const startBtn    = document.getElementById('startBtn');
const beatFlash   = document.getElementById('beatFlash');
const signalBarsEl= document.getElementById('signalBars');

// ── BPM DETECTION via onset / autocorrelation ──
// Ring buffer of onset times
let onsetTimes = [];
let lastOnsetTime = 0;
let bpmHistory = [];
const BPM_HISTORY_LEN = 8;

let prevEnergy = 0;
let beatCooldown = 0;

function flashBeat() {
  beatFlash.classList.add('flash');
  setTimeout(()=>beatFlash.classList.remove('flash'), 60);
}

function medianBPM(arr) {
  if(!arr.length) return null;
  const s=[...arr].sort((a,b)=>a-b);
  const m=Math.floor(s.length/2);
  return s.length%2?s[m]:(s[m-1]+s[m])/2;
}

// ── KEY: accumulate chroma over ~3s ──
let chromaAccum = new Float32Array(12);
let chromaFrames = 0;
const CHROMA_FRAMES = 90; // update key every ~90 analysis frames
let currentKey = '--';

function computeChroma(timeDomain, sampleRate) {
  const N = timeDomain.length;
  // Simple chromagram via frequency bins from FFT
  // We'll use the frequency domain data
  return null; // handled below with separate analyser
}

// ── MAIN LOOP ──
let freqAnalyser, timeAnalyser;

function analyse() {
  if(!running) return;
  requestAnimationFrame(analyse);

  const bufLen = timeAnalyser.frequencyBinCount;
  const timeBuf = new Float32Array(bufLen);
  timeAnalyser.getFloatTimeDomainData(timeBuf);

  const freqBuf = new Uint8Array(freqAnalyser.frequencyBinCount);
  freqAnalyser.getByteFrequencyData(freqBuf);

  const sampleRate = audioCtx.sampleRate;
  const now = audioCtx.currentTime;

  // ── Signal strength (RMS) ──
  let rms = 0;
  for(let i=0;i<timeBuf.length;i++) rms+=timeBuf[i]*timeBuf[i];
  rms = Math.sqrt(rms/timeBuf.length);

  // Update signal bars
  const bars = signalBarsEl.querySelectorAll('.bar');
  const level = Math.min(rms * 14, 1);
  bars.forEach((b,i)=>b.classList.toggle('on', i/bars.length < level));

  // ── BPM: sub-band energy onset ──
  // Use 60Hz–180Hz (kick/bass range) for beat detection
  const binHz = sampleRate / (freqAnalyser.fftSize);
  const loB = Math.floor(50/binHz);
  const hiB = Math.floor(200/binHz);
  let energy = 0;
  for(let i=loB;i<hiB&&i<freqBuf.length;i++) energy+=freqBuf[i]*freqBuf[i];
  energy /= (hiB-loB);

  beatCooldown = Math.max(0, beatCooldown-1);
  const energyRise = energy - prevEnergy;
  const threshold = Math.max(300, prevEnergy * 0.3);

  if(energyRise > threshold && beatCooldown===0 && rms > 0.005) {
    const gap = now - lastOnsetTime;
    if(gap > 0.25 && gap < 2.5) { // 24–240 BPM range
      const instantBPM = 60 / gap;
      // Quantize to likely BPM (halve/double to stay in 70-180 range)
      let bpm = instantBPM;
      while(bpm > 180) bpm /= 2;
      while(bpm < 70)  bpm *= 2;
      bpmHistory.push(bpm);
      if(bpmHistory.length > BPM_HISTORY_LEN) bpmHistory.shift();
    }
    lastOnsetTime = now;
    beatCooldown = 8;
    flashBeat();
  }
  prevEnergy = energy * 0.85 + prevEnergy * 0.15;

  // Display BPM
  const median = medianBPM(bpmHistory);
  if(median && bpmHistory.length >= 3) {
    const rounded = Math.round(median * 10) / 10;
    bpmDisplay.textContent = rounded.toFixed(1);
    bpmDisplay.classList.remove('dim');
    bpmUnit.classList.add('active');
  }

  // ── KEY: chromagram ──
  // Map FFT bins to 12 pitch classes
  const fftSize = freqAnalyser.fftSize;
  const freqPerBin = sampleRate / fftSize;
  const chroma = new Float32Array(12);

  // Use 65Hz (C2) to 2093Hz (C7)
  for(let i=0;i<freqBuf.length;i++) {
    const freq = i * freqPerBin;
    if(freq < 65 || freq > 2100) continue;
    const pitch = 12 * Math.log2(freq / 440) + 9; // semitones from A0=0
    const pc = ((Math.round(pitch) % 12) + 12) % 12;
    chroma[pc] += freqBuf[i];
  }

  // Accumulate
  for(let i=0;i<12;i++) chromaAccum[i]+=chroma[i];
  chromaFrames++;

  if(chromaFrames >= CHROMA_FRAMES) {
    // Normalise
    let maxC=0;
    for(let i=0;i<12;i++) if(chromaAccum[i]>maxC) maxC=chromaAccum[i];
    if(maxC>0) {
      const norm = chromaAccum.map(v=>v/maxC);
      const key = detectKey(norm);
      if(key!=='--') {
        currentKey = key;
        keyDisplay.textContent = key;
        keyDisplay.classList.remove('dim');
      }
    }
    chromaAccum.fill(0);
    chromaFrames = 0;
  }
}

async function startListening() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaStreamSource(stream);

    // Time domain analyser (BPM energy detection)
    timeAnalyser = audioCtx.createAnalyser();
    timeAnalyser.fftSize = 1024;
    timeAnalyser.smoothingTimeConstant = 0.5;

    // Frequency analyser (key detection)
    freqAnalyser = audioCtx.createAnalyser();
    freqAnalyser.fftSize = 4096;
    freqAnalyser.smoothingTimeConstant = 0.7;

    source.connect(timeAnalyser);
    source.connect(freqAnalyser);

    running = true;
    statusDot.classList.add('live');
    startBtn.textContent = '■ STOP';
    startBtn.classList.remove('primary');

    // Reset state
    bpmHistory = [];
    chromaAccum.fill(0);
    chromaFrames = 0;
    prevEnergy = 0;
    beatCooldown = 0;
    lastOnsetTime = 0;

    analyse();
  } catch(e) {
    alert('Microphone access denied. Please allow mic access and try again.');
  }
}

function stopListening() {
  running = false;
  if(stream) stream.getTracks().forEach(t=>t.stop());
  if(audioCtx) audioCtx.close();
  statusDot.classList.remove('live');
  startBtn.textContent = '▶ LISTEN';
  startBtn.classList.add('primary');
  bpmDisplay.textContent = '---';
  bpmDisplay.classList.add('dim');
  keyDisplay.textContent = '--';
  keyDisplay.classList.add('dim');
  bpmUnit.classList.remove('active');
  signalBarsEl.querySelectorAll('.bar').forEach(b=>b.classList.remove('on'));
}

startBtn.addEventListener('click', ()=>{
  if(running) stopListening(); else startListening();
});

// ── TAP BPM ──
let tapTimes = [];
let tapTimer;
const tapBtn = document.getElementById('tapBtn');

tapBtn.addEventListener('click', ()=>{
  const now = performance.now();
  tapTimes.push(now);
  clearTimeout(tapTimer);
  tapTimer = setTimeout(()=>tapTimes=[], 3000);

  if(tapTimes.length > 1) {
    const gaps = [];
    for(let i=1;i<tapTimes.length;i++) gaps.push(tapTimes[i]-tapTimes[i-1]);
    const avg = gaps.reduce((a,b)=>a+b,0)/gaps.length;
    const bpm = 60000/avg;
    if(bpm>40&&bpm<250) {
      bpmDisplay.textContent = bpm.toFixed(1);
      bpmDisplay.classList.remove('dim');
      bpmUnit.classList.add('active');
    }
  }
  flashBeat();
});
</script>
</body>
</html>
